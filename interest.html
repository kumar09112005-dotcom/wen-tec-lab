      <input type="number" id="start_year" placeholder="YYYY" min="1900" max="2025">
      <label>TO:</label>
      <input type="number"  id="end_year" placeholder="YYYY" min="1900" max="2025"><br><br>
      <div class="center">
    <input type="submit" value="CostTax"onclick="interest()"> <br><br>
     </div>
      </form>
      
      <script>
      function interest(){
      var sy=Number(document.getElementById("start_year"));
      var ey=Number(document.getElementById("end_year"));
      
      if(sy<ey){
           var result=ey-sy*1000;
           let newpa=document.createElement('p');
           newpa.inneText="cost:"+result;
           document.body.appendChild(newpa);
           
      }
      }
      
      </script>
