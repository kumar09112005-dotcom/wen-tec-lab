<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cost Tax Calculator</title>

<style>
    
body {
    margin: 0;
    padding: 0;
    font-family: sans-serif;
}
*{
	font-size:18px;

}
/* TOP MENU */
.top-nav {
    display: flex;
    justify-content: space-around;
    align-items: center;
    height: 60px;
    background-color: #1f2937;
}

.top-nav a {
    text-decoration: none;
    font-size: 18px;
    color: white;
}

.home-icon img {
    width: 26px;
    filter: invert(1);
}

.main {
    display: flex;
    height: calc(100vh - 60px);
}

/* SIDEBAR */
ul {
  list-style-type: none;
  margin: 0;
  padding: 10px;
  width: 180px;
  height: 40%;
  background-color: #f1f1f1;
}

li a {
  display: block;
  color: black;
  padding: 8px 16px;
  text-decoration: none;
}

/* Change the link and background color on hover */
li a:hover {
  background-color: #e7ae44;
  color: white;
}
/* CONTENT */
.content {
    flex: 1;
    padding: 40px;
    text-align: center;
}

p {
    text-align: left;
    font-size: 18px;
    font-weight: bold;
}
</style>
</head>

<body>

<!-- TOP NAV -->
<nav class="top-nav">
    <a href="page.html" class="home-icon">
        <img src="https://cdn-icons-png.flaticon.com/512/25/25694.png">
    </a>
    <a href="contacts.html">Contact</a>
    <a href="#">History</a>
    <a href="#">Help</a>
    <a href="login.html">Register</a>
</nav>

<div class="main">

    <!-- SIDEBAR -->
    <ul>
            <li><a href="page.html">Home</a></li>
            <li><a href="contacts.html">Contact</a></li> 
            <li><a href="news.html">News</a></li> 
            <li><a href="#">History</a></li>
            <li><a href="#">Help</a></li>
            <li><a href="calculator.html">calculator</a></li> 
          <li><a href="tax.html">Tax</a></li>
          <ul class="subnav">
              <li><a href="admin_login.html" >Admin Login</a></li>
               
    </ul>
        </ul>

    <!-- CONTENT -->
    <div class="content">

        <form class="matham">
            <label>UserID:</label>
            <input type="number" placeholder="Enter ID"><br><br>

            <label>From:</label>
            <input type="number" id="start_year" placeholder="YYYY" min="1900" max="2025">

            <label>To:</label>
            <input type="number" id="end_year" placeholder="YYYY" min="1900" max="2025">
            <br><br>

            <!-- IMPORTANT: button type -->
            <input type="button" value="CostTax" onclick="interest()">
        </form>

        <br>
        <p id="Result" style="text-align: center;"></p>

    </div>
</div>

<script>
function interest() {
    var sy = Number(document.getElementById("start_year").value);
    var ey = Number(document.getElementById("end_year").value);

    if (sy === 0 || ey === 0) {
        alert("Please enter both years");
        return;
    }

    if (sy < ey) {
        var result = ((ey - sy) * 1000 )+(ey - sy) * 200;
    
        document.getElementById("Result").innerText =
            "Cost Tax: Rs " + result;
    } else {
        alert("End year must be greater than Start year");
    }
}
</script>

</body>
