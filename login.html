<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Home</title>
<style>
body {
    margin: 0;
    font-family: sans-serif;
}
.top-nav {
    display: flex;
    justify-content: space-around;
    align-items: center;
    height: 60px;
    background-color: #1f2937;
}
.top-nav a {
    text-decoration: none;
    font-size: 18px;
    color: white;
}
.home-icon img {
    width: 26px;
    filter: invert(1);
}
.main {
    display: flex;
    height: calc(100vh - 60px);
}
.sidebar {
    width: 200px;
    background-color: #f97316;
    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
}
.sidebar a {
    text-decoration: none;
    font-size: 18px;
    color: white;
    text-align: center;
}
.content {
    flex: 1;
    padding: 40px;
    text-align: center;
}
.content form input[type="text"],
.content form input[type="password"] {
    display: block;
    margin: 10px auto;
    padding: 10px;
    font-size: 16px;
    width: 250px;
}
.content form input[type="submit"] {
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
    background-color: #1f2937;
    color: white;
    border: none;
    border-radius: 5px;
}
.register-btn {
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
    background-color: #f97316;
    color: white;
    border: none;
    border-radius: 5px;
    margin-top: 15px;
}
</style>
</head>
<body>
<nav class="top-nav">
    <a href="page.html" class="home-icon">
        <img src="https://cdn-icons-png.flaticon.com/512/25/25694.png">
    </a>
    <a href="contacts.html">Contact</a>
    <a href="#">News</a>
    <a href="#">Help</a>
    <a href="login.html">Register</a>
</nav>
<div class="main">
    <div class="sidebar">
        <a href="page.html">Home</a>
        <a href="contacts.html">Contact</a>
        <a href="#">News</a>
        <a href="#">Help</a>
        <a href="login.html">Register</a>
    </div>
    <div class="content">
        <h2>Login</h2>
        <form action="/login" method="post">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <input type="submit" value="Submit">
        </form>
        <button class="register-btn" onclick="window.location.href='register.html'">Register</button>
    </div>
</div>
</body>
</html>
