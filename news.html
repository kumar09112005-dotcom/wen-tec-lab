<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PDF Viewer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body {
    margin: 0;
    font-family: sans-serif;
}
*{
	font-size:18px;
}
/* TOP MENU */
.top-nav {
    display: flex;
    justify-content: space-around;
    align-items: center;
    height: 60px;
    background-color: #1f2937;
}

.top-nav a {
    text-decoration: none;
    font-size: 18px;
    color: white;
}

.home-icon img {
    width: 26px;
    filter: invert(1);
}

/* MAIN */
.main {
    display: flex;
    height: calc(100vh - 60px);
}

/* SIDEBAR */
ul {
  list-style-type: none;
  margin: 0;
  padding: 10px;
  width: 180px;
  height: 50%;
  background-color: #f1f1f1;
}

li a {
  display: block;
  color: black;
  padding: 8px 16px;
  text-decoration: none;
}

/* Change the link and background color on hover */
li a:hover {
  background-color: #e7ae44;
  color: white;
}

/* CONTENT */
.content {
    flex: 1;
    padding: 40px;
}

/* TOOLBAR – very light change only */
.toolbar {
  background: #e5e7eb;
  padding: 10px;
  text-align: center;
  margin-bottom: 10px;
}

button {
  margin: 5px;
  padding: 6px 12px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

.file-center {
  margin-top: 8px;
}

/* VIEWER (unchanged) */
#viewer {
  padding: 10px;
}

.single {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
}

.two {
  display: flex;
  justify-content: center;
  gap: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
}

canvas {
  background: white;
  box-shadow: 0 0 5px rgba(0,0,0,0.3);
  cursor: pointer;
}
.subnav{
    font-family: "Times New Roman", Times, serif;
      font-size: 6px;
}
</style>
</head>

<body>

<!-- TOP NAV -->
<nav class="top-nav">
    <a href="page.html" class="home-icon">
        <img src="https://cdn-icons-png.flaticon.com/512/25/25694.png">
    </a>
    <a href="contacts.html">Contact</a>
    <a href="#">Historys</a>
    <a href="#">Help</a>
    <a href="login.html">Register</a>
</nav>

<div class="main">

    <!-- SIDEBAR -->
   <ul>
            <li><a href="page.html">Home</a></li>
            <li><a href="contacts.html">Contact</a></li>
            <li><a href="news.html">News</a>
            <ul class="subnav">
              <li><a href="#" onclick="singleView()">Scroll View</a></li>
                <li><a href="#" onclick="twoView()">Dual View</a></li>
                  <li><a href="#" onclick="gridView()">Thumbnail View</a></li>
          </ul>
            </li>
            <li><a href="#">History</a></li>
            <li><a href="#">Help</a></li>
            <li><a href="calculator.html">calculator</a></li>
          <li><a href="tax.html">Tax</a></li>
        </ul>

    <!-- CONTENT -->
    <div class="content">

        <div class="toolbar">
            <div class="file-center">
                <input type="file" accept="application/pdf" onchange="loadPDF(this)">
            </div>
        </div>

        <div id="viewer"></div>

<script>
let pdf = null;
let currentPage = 1;

function loadPDF(input) {
  const file = input.files[0];
  if (!file) return;

  const url = URL.createObjectURL(file);
  pdfjsLib.getDocument(url).promise.then(p => {
    pdf = p;
    currentPage = 1;
    singleView();
  });
}

function clearViewer() {
  document.getElementById("viewer").innerHTML = "";
}

function renderPage(pageNum, scale = 1.2, clickFn = null) {
  if (!pdf) return;
  pdf.getPage(pageNum).then(page => {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");
    const viewport = page.getViewport({ scale });

    canvas.width = viewport.width;
    canvas.height = viewport.height;

    page.render({ canvasContext: ctx, viewport });

    if (clickFn) {
      canvas.onclick = clickFn;
    }

    document.getElementById("viewer").appendChild(canvas);
  });
}

function singleView() {
  if (!pdf) return;
  clearViewer();
  document.getElementById("viewer").className = "single";

  for (let i = 1; i <= pdf.numPages; i++) {
    renderPage(i, 1.3);
  }
}

function twoView() {
  if (!pdf) return;
  clearViewer();
  document.getElementById("viewer").className = "two";

  if (currentPage > 1) {
    renderPage(currentPage - 1, 1.1, () => {
      currentPage -= 2;
      twoView();
    });
  }

  if (currentPage <= pdf.numPages) {
    renderPage(currentPage, 1.1, () => {
      if (currentPage < pdf.numPages) currentPage += 2;
      twoView();
    });
  }
}

function gridView() {
  if (!pdf) return;
  clearViewer();
  document.getElementById("viewer").className = "grid";

  for (let i = 1; i <= pdf.numPages; i++) {
    pdf.getPage(i).then(page => {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      const viewport = page.getViewport({ scale: 0.4 });

      canvas.width = viewport.width;
      canvas.height = viewport.height;

      page.render({ canvasContext: ctx, viewport });

      canvas.onclick = () => {
        currentPage = i;
        singleView();
      };

      document.getElementById("viewer").appendChild(canvas);
    });
  }
}
</script>

    </div>
</div>

</body>
</html>
