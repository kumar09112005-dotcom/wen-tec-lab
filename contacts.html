<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Colored Menus</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
}
*{
	font-size:18px;
}
/* TOP MENU */
.top-nav {
    display: flex;
    justify-content: space-around;
    align-items: center;
    height: 60px;
    background-color: #1f2937;
}

.top-nav a {
    text-decoration: none;
    font-size: 18px;
    color: white;
}

.home-icon img {
    width: 26px;
    filter: invert(1);
}

/* MAIN */
.main {
    display: flex;
    height: calc(100vh - 60px);
}

/* SIDEBAR */
ul {
  list-style-type: none;
  margin: 0;
  padding: 10px;
  width: 180px;
  height: 50%;
  background-color: #f1f1f1;
}

li a {
  display: block;
  color: black;
  padding: 8px 16px;
  text-decoration: none;
}

/* Change the link and background color on hover */
li a:hover {
  background-color: #e7ae44;
  color: white;
}

/* CONTENT */
.content {
    flex: 1;
    padding: 40px;
    
}

.toolbar {
  background: #eee;
  padding: 10px;
  text-align: center;
}

button {
  margin: 5px;
  padding: 6px 12px;
}

#viewer {
  padding: 10px;
}


.single {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
}



.two {
  display: flex;
  justify-content: center;
  gap: 10px;
}


.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 50px;
}

canvas {
  background: white;
  box-shadow: 0 0 5px rgba(0,0,0,0.3);
  cursor: pointer;
}

.content h1 {
    font-size: 36px;
}

.content img {
    width: 300px;
    margin-top: 20px;
}
.subnav{
    font-family: "Times New Roman", Times, serif;
      font-size: 8px;
}
</style>
</head>
<body>

<!-- TOP MENU -->
<nav class="top-nav">
    <a href="page.html" class="home-icon">
        <img src="https://cdn-icons-png.flaticon.com/512/25/25694.png">
    </a>
    <a href="contacts.html">Contact</a>
    <a href="#">History</a>
    <a href="#">Help</a>
    <a href="login.html">Register</a>
</nav>

<!-- MAIN LAYOUT -->
<div class="main">

    <!-- LEFT MENU -->
   <ul>
            <li><a href="page.html">Home</a></li>
            <li><a href="contacts.html">Contact</a>
                <ul class ="subnav">
                    <li><a href="#">Mangers</a></li>
                     <li><a href="#">Empolyees</a></li>
                      <li><a href="#">Test Team</a></li>
                </ul>
            </li> 
            <li><a href="news.html">News</a></li> 
            <li><a href="#">History</a></li>
            <li><a href="#">Help</a></li>
            <li><a href="calculator.html">calculator</a></li> 
          <li><a href="tax.html">Tax</a></li>
        </ul>

    <!-- CONTENT -->
    <div class="content">
        <h1>Welcome</h1>
        <p>This is your main content area.</p>
    </div>

</div>

</body>
</html>
