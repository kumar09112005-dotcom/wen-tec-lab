<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Colored Menus</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
}

/* ---------- TOP HORIZONTAL MENU ---------- */
.top-nav {
    display: flex;
    justify-content: space-around;
    align-items: center;
    height: 60px;
    background-color: #1f2937;
}

.top-nav a {
    text-decoration: none;
    font-size: 18px;
    color: white;
}

.home-icon img {
    width: 26px;
    filter: invert(1);
}

/* ---------- MAIN LAYOUT ---------- */
.main {
    display: flex;
    height: calc(100vh - 60px);
}

/* ---------- LEFT VERTICAL MENU ---------- */
.sidebar {
    width: 200px;
    background-color: #f97316;
    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
}

.sidebar a {
    text-decoration: none;
    font-size: 18px;
    color: white;
    text-align: center;
    padding: 10px 0;
}

/* ---------- CONTENT ---------- */
.content {
    flex: 1;
    padding: 40px;
    text-align: center;
}

.content h1 {
    font-size: 36px;
}

.content img {
    width: 300px;
    margin-top: 20px;
}
</style>
</head>
<body>

<!-- TOP MENU -->
<nav class="top-nav">
    <a href="page.html" class="home-icon">
        <img src="https://cdn-icons-png.flaticon.com/512/25/25694.png">
    </a>
    <a href="contacts.html">Contact</a>
    <a href="#">News</a>
    <a href="#">Help</a>
    <a href="login.html">Register</a>
</nav>

<!-- MAIN LAYOUT -->
<div class="main">

    <!-- LEFT MENU -->
    <div class="sidebar">
        <a href="page.html">Home</a>
        <a href="contacts.html">Contact</a>
        <a href="#">News</a>
        <a href="#">Help</a>
        <a href="login.html">Register</a>
    </div>

    <!-- CONTENT -->
    <div class="content">
        <h1>Welcome</h1>
        <p>This is your main content area.</p>
    </div>

</div>

</body>
</html>
